name: Release (desktop installers)

# Build signed-ready installers for Windows, macOS, and Linux.
# Trigger by pushing a tag like `v0.1.0`, or run manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          # One universal .dmg (Intel + Apple Silicon) built on the fast
          # Apple-Silicon runner. Avoids the scarce/slow macos-13 Intel runner.
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-latest
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40 # never let a queued/hung runner stall the release for hours
    steps:
      - uses: actions/checkout@v4

      - name: Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libxdo-dev libxss-dev \
            libpipewire-0.3-dev libclang-dev libgbm-dev

      # Version comes from the root package.json "packageManager" field
      # (pnpm/action-setup errors if a version is ALSO specified here).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # tauri-action builds the frontend (beforeBuildCommand) and bundles the
      # platform installer (.msi/.exe, .dmg/.app, .deb/.AppImage), then uploads.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Desktop API base for production builds (override per environment).
          TIMETRACKER_API_BASE_URL: ${{ vars.TIMETRACKER_API_BASE_URL || 'http://localhost:9000' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "TimeTracker ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
