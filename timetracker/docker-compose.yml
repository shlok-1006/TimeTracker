# Local development infrastructure for TimeTracker.
#   postgres -> source of truth for synced activity (Rule 4)
#   minio    -> S3-compatible object storage for screenshot bytes (Rule 5)
#
# Usage:
#   docker compose up -d
#   docker compose down            # keep volumes
#   docker compose down -v         # wipe volumes
#
# MinIO console: http://localhost:9001  (user: minioadmin / pass: minioadmin)

name: timetracker

services:
  postgres:
    image: postgres:16-alpine
    container_name: timetracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: timetracker
      POSTGRES_PASSWORD: timetracker
      POSTGRES_DB: timetracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetracker -d timetracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: timetracker-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data

  # One-shot job: create the screenshots bucket so the app can upload immediately.
  # Retries until MinIO accepts connections (no dependency on a server healthcheck,
  # which the minio image's missing tooling makes unreliable).
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: timetracker-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 2;
      done &&
      mc mb --ignore-existing local/screenshots &&
      mc anonymous set none local/screenshots &&
      echo 'MinIO bucket ready: screenshots';
      "

volumes:
  postgres_data:
  minio_data:
