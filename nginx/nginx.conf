# Nginx reverse proxy — the single web entrypoint for TimeTracker.
#
#   http://<VM_HOST>/        -> admin dashboard (Next.js, admin-web:3001)
#   http://<VM_HOST>/api/... -> API server (server:9000), /api prefix stripped
#
# The admin-web image is built with NEXT_PUBLIC_API_BASE_URL=/api, so the browser
# makes same-origin requests to /api/* — no CORS, and no VM IP baked into the
# bundle. The desktop app and MinIO are NOT fronted here: the desktop talks to
# the API directly (server :9000) and uploads/fetches screenshots straight from
# MinIO (:9100) via presigned URLs whose signatures are tied to that host.
#
# For HTTPS, terminate TLS in a `listen 443 ssl;` server block (certs mounted in)
# and redirect :80 -> :443. See the deployment notes.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    # JSON-ish access log to stdout (visible via `docker compose logs nginx`).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    upstream admin_web {
        server admin-web:3001;
    }
    upstream api {
        server server:9000;
    }

    server {
        listen 80;
        server_name _;

        # Screenshots upload directly to MinIO, so the API itself sees only small
        # JSON bodies — but leave headroom.
        client_max_body_size 25m;

        # ---- API: strip the /api prefix and forward to the Axum server ----
        # The trailing slash on proxy_pass makes Nginx replace the matched
        # "/api/" with "/", so /api/auth/login -> /auth/login upstream.
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Vision-AI analysis (/api/admin/users/:id/analyze) calls Gemini over
            # several screenshots and can run well past the 60s default.
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # ---- Admin dashboard (Next.js) ----
        location / {
            proxy_pass http://admin_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
