# Full TimeTracker stack (dev + single-VM production).
#   postgres  -> source of truth for synced activity (Rule 4)         :5432
#   minio     -> S3-compatible object storage for screenshots (Rule 5) :9100 (S3) / :9001 (console)
#   server    -> Axum API server, built from ./Dockerfile              :9000
#   admin-web -> Next.js admin dashboard, built from ./Dockerfile.admin :3001 (internal)
#   nginx     -> reverse proxy / web entrypoint                        :80
#
# The desktop app is a native Tauri app and is NOT containerized; it talks to the
# API directly on :9000 and uploads screenshots straight to MinIO on :9100.
#
# Web entrypoint (browser): http://<VM_HOST>/  -> dashboard, http://<VM_HOST>/api -> API.
#
# Usage:
#   docker compose up -d --build   # build + start the whole stack
#   docker compose down            # keep volumes
#   docker compose down -v         # wipe volumes
#
# MinIO console: http://localhost:9001  (user: minioadmin / pass: minioadmin)

name: timetracker

services:
  postgres:
    image: postgres:16-alpine
    container_name: timetracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: timetracker
      POSTGRES_PASSWORD: timetracker
      POSTGRES_DB: timetracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetracker -d timetracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: timetracker-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"   # S3 API on host :9100 (host :9000 is now the API server)
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data

  # One-shot job: create the screenshots bucket so the app can upload immediately.
  # Retries until MinIO accepts connections (no dependency on a server healthcheck,
  # which the minio image's missing tooling makes unreliable).
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: timetracker-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 2;
      done &&
      mc mb --ignore-existing local/screenshots &&
      mc anonymous set none local/screenshots &&
      echo 'MinIO bucket ready: screenshots';
      "

  # API server — built from ./Dockerfile, exposed on :9000. Talks to the
  # postgres + minio services over the compose network. Secrets are read from
  # the project .env via ${VAR} interpolation (with safe dev defaults).
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timetracker-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "9000"
      # Internal compose-network hostnames (NOT localhost).
      DATABASE_URL: postgres://timetracker:timetracker@postgres:5432/timetracker
      DATABASE_MAX_CONNECTIONS: "10"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_ACCESS_TTL_SECONDS: "900"
      JWT_REFRESH_TTL_SECONDS: "2592000"
      # Presigned-URL host: must be reachable by clients. Locally that's MinIO's
      # published port (localhost:9100); on a VM set S3_ENDPOINT in .env to the
      # public address (or a Cloudflare R2 endpoint). Driven by .env so the same
      # compose file works in dev and prod.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9100}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-screenshots}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:9000}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RUST_LOG: info,server=debug,sqlx=warn
    ports:
      - "9000:9000"

  # Admin dashboard (Next.js). NEXT_PUBLIC_API_BASE_URL is inlined at BUILD time,
  # so it is passed as a build arg (not a runtime env). Default "/api" => the
  # browser makes same-origin calls that Nginx routes to the API container.
  admin-web:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    container_name: timetracker-admin-web
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - "3001"   # internal only; reached through Nginx

  # Reverse proxy / single web entrypoint on :80.
  #   /     -> admin-web:3001
  #   /api/ -> server:9000  (prefix stripped)
  nginx:
    image: nginx:1.27-alpine
    container_name: timetracker-nginx
    restart: unless-stopped
    depends_on:
      - admin-web
      - server
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  minio_data:
